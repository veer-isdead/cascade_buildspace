<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Shipment Tracking | Cascade</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <link href="../css/styles.css" rel="stylesheet"/>
  <style>
    body { font-family: "Inter", sans-serif; background: #060e20; }
    .glass-panel { background: rgba(15, 25, 48, 0.45); backdrop-filter: blur(18px); }
  </style>
</head>
<body class="bg-surface text-on-surface min-h-screen">
  <header class="fixed top-0 z-50 flex h-20 w-full items-center justify-between border-b border-white/10 bg-[#060e20]/70 px-8 backdrop-blur-xl">
    <span class="text-2xl font-headline font-semibold tracking-tighter text-primary">Cascade</span>
    <nav class="hidden md:flex items-center gap-8">
      <a class="text-on-surface-variant hover:text-on-surface" href="#">Dashboard</a>
      <a class="text-on-surface-variant hover:text-on-surface" href="#">Hub Monitor</a>
      <a class="border-b-2 border-primary pb-1 text-primary" href="#">Shipment Tracking</a>
      <a class="text-on-surface-variant hover:text-on-surface" href="#">Alerts</a>
      <button class="material-symbols-outlined rounded-full p-2 text-primary hover:bg-white/5">light_mode</button>
    </nav>
  </header>
  <main class="px-6 pb-16 pt-28 md:px-10">
    <section class="mx-auto max-w-7xl">
      <div class="mb-10 flex flex-col gap-6 md:flex-row md:items-end md:justify-between">
        <div>
          <h1 class="font-headline text-4xl font-bold tracking-tighter">Shipment Tracking</h1>
          <p class="mt-2 text-on-surface-variant">Live shipment status, ETA tracking, and automated reroute visibility.</p>
        </div>
      </div>
      <div class="mb-8 grid grid-cols-1 gap-6 md:grid-cols-4">
        <div class="glass-panel rounded-3xl border border-white/10 p-6"><p class="text-xs uppercase tracking-widest text-on-surface-variant">Total Shipments</p><p class="mt-3 font-mono text-4xl text-primary" data-shipment-stat>--</p></div>
        <div class="glass-panel rounded-3xl border border-white/10 p-6"><p class="text-xs uppercase tracking-widest text-on-surface-variant">In Transit</p><p class="mt-3 font-mono text-4xl text-secondary" data-shipment-stat>--</p></div>
        <div class="glass-panel rounded-3xl border border-white/10 p-6"><p class="text-xs uppercase tracking-widest text-on-surface-variant">Rerouted</p><p class="mt-3 font-mono text-4xl text-tertiary" data-shipment-stat>--</p></div>
        <div class="glass-panel rounded-3xl border border-white/10 p-6"><p class="text-xs uppercase tracking-widest text-on-surface-variant">Bottlenecks</p><p class="mt-3 font-mono text-4xl text-error" data-shipment-stat>--</p></div>
      </div>
      <div class="glass-panel overflow-hidden rounded-3xl border border-white/10">
        <div class="overflow-x-auto">
          <table class="w-full text-left">
            <thead class="border-b border-white/10 text-xs uppercase tracking-widest text-on-surface-variant">
              <tr>
                <th class="px-6 py-4">Shipment ID</th>
                <th class="px-6 py-4">Current Hub</th>
                <th class="px-6 py-4">Status</th>
                <th class="px-6 py-4">ETA</th>
                <th class="px-6 py-4">Route</th>
              </tr>
            </thead>
            <tbody class="font-body text-sm"></tbody>
          </table>
        </div>
      </div>
    </section>
  </main>
  <script src="../js/api.js"></script>
  <script src="../js/shipments.js"></script>
</body>
</html>
